<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Audio to UI Builder</title>
    <!-- Built-in styles to guarantee the gorgeous dark mode look instantly -->
    <style>
      body {
        margin: 0;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background-color: #020617;
        color: #ffffff;
        display: flex;
        flex-direction: row;
        min-height: 100vh;
      }
      .sidebar {
        width: 33.333%;
        padding: 2rem;
        border-right: 1px solid #1e293b;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        box-sizing: border-box;
      }
      .main-title {
        font-size: 1.875rem;
        font-weight: 800;
        margin: 0 0 0.5rem 0;
        background: linear-gradient(to right, #22d3ee, #3b82f6);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }
      .subtitle {
        color: #94a3b8;
        font-size: 0.875rem;
        margin: 0 0 5rem 0;
        line-height: 1.5;
      }
      .center-area {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        margin-top: auto;
        margin-bottom: auto;
      }
      .record-btn {
        width: 6rem;
        h_eight: 6rem;
        height: 6rem;
        background-color: #2563eb;
        border: none;
        border-radius: 50%;
        color: white;
        font-size: 1.25rem;
        font-weight: bold;
        cursor: pointer;
        transition: all 0.2s;
        box-shadow: 0 10px 15px -3px rgba(59, 130, 246, 0.4);
      }
      .record-btn:hover {
        transform: scale(1.05);
        background-color: #1d4ed8;
      }
      .record-btn.recording {
        background-color: #dc2626;
        animation: pulse 1.5s infinite;
        box-shadow: 0 10px 15px -3px rgba(220, 38, 38, 0.4);
      }
      .status-txt {
        font-size: 0.75rem;
        color: #64748b;
        margin-top: 1rem;
        font-weight: 500;
      }
      .loading-box {
        display: none;
        align-items: center;
        gap: 0.75rem;
        color: #22d3ee;
        background-color: #0f172a;
        border: 1px solid #1e293b;
        padding: 1rem;
        border-radius: 0.75rem;
        margin-top: auto;
      }
      .spinner {
        width: 1rem;
        height: 1rem;
        border: 2px solid transparent;
        border-bottom-color: #22d3ee;
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }
      .canvas-area {
        width: 66.666%;
        display: flex;
        flex-direction: column;
        background-color: #0f172a;
      }
      .canvas-header {
        padding: 1rem;
        background-color: #020617;
        border-bottom: 1px solid #1e293b;
        color: #cbd5e1;
        font-weight: 500;
      }
      .preview-iframe {
        width: 100%;
        flex: 1;
        bg-color: white;
        background-color: white;
        border: none;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
      @keyframes pulse {
        0%,
        100% {
          transform: scale(1);
          opacity: 1;
        }
        50% {
          transform: scale(1.05);
          opacity: 0.8;
        }
      }
    </style>
  </head>
  <body>
    <!-- Left Layout Control Sidebar Panel -->
    <div class="sidebar">
      <div>
        <h1 class="main-title">Audio-to-UI Pitcher</h1>
        <p class="subtitle">
          Click record, describe your app idea clearly, and watch it generate.
        </p>
        <div class="center-area">
          <button id="recordBtn" class="record-btn">🎙️ Start</button>
          <p id="status" class="status-txt">Ready to record</p>
        </div>
      </div>
      <div id="loading" class="loading-box">
        <div class="spinner"></div>
        <span style="font-size: 0.875rem"
          >Gemini AI is building your code...</span
        >
      </div>
    </div>

    <!-- Right Live Render Output Display Canvas -->
    <div class="canvas-area">
      <div class="canvas-header" id="uiTitle">Your Live Canvas Preview</div>
      <iframe
        id="preview"
        class="preview-iframe"
        srcdoc="<div style='display:flex; justify-content:center; align-items:center; height:100%; font-family:sans-serif; color:#94a3b8;'>Your app will appear here after recording</div>"
      ></iframe>
    </div>

    <script>
      let mediaRecorder;
      let chunks = [];
      let recording = false;
      const btn = document.getElementById("recordBtn");
      const status = document.getElementById("status");
      const loading = document.getElementById("loading");
      const preview = document.getElementById("preview");
      const uiTitle = document.getElementById("uiTitle");

      btn.onclick = async () => {
        if (!recording) {
          chunks = [];
          try {
            const stream = await navigator.mediaDevices.getUserMedia({
              audio: true,
            });
            mediaRecorder = new MediaRecorder(stream);
          } catch (err) {
            alert(
              "Microphone access blocked! Enable microphone permission in your browser address bar.",
            );
            return;
          }

          mediaRecorder.ondataavailable = (e) => chunks.push(e.data);

          mediaRecorder.onstop = async () => {
            loading.style.display = "flex";
            status.innerText = "Processing...";
            const blob = new Blob(chunks, { type: "audio/webm" });
            const fd = new FormData();
            fd.append("audio", blob);

            try {
              const res = await fetch("http://localhost:9000/api/generate-ui", {
                method: "POST",
                body: fd,
              });
              const data = await res.json();
              if (data.error) {
                throw new Error(data.error);
              }

              uiTitle.innerText = data.title;

              const frameHTML =
                "<!DOCTYPE html><html><head><meta charset='UTF-8'><script src='https://tailwindcss.com'><\/script></head><body class='p-6 bg-slate-50 min-h-screen'>" +
                data.code +
                "</body></html>";
              preview.srcdoc = frameHTML;
            } catch (err) {
              alert(
                "Error communicating with Gemini backend server! Make sure 'node server.js' is running inside your terminal.",
              );
            }

            loading.style.display = "none";
            status.innerText = "Ready to record";
            btn.className = "record-btn";
            btn.innerText = "🎙️ Start";
          };

          mediaRecorder.start();
          recording = true;
          btn.innerText = "🛑 Stop";
          btn.className = "record-btn recording";
          status.innerText = "Recording voice note...";
        } else {
          mediaRecorder.stop();
          recording = false;
        }
      };
    </script>
  </body>
</html>
